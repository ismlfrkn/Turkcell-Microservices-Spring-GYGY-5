spring:
    application:
        name: order-service    
    cloud:
        stream:
            bindings:
               
                orderEvent-out-0:
                    destination: order-topic #hangi başlığa mesaj göndereceğini belirtiyoruz
                    content-type: application/json # hangi formatta mesaj göndereceğini belirtiyoruz
            
            kafka:
                binder:
                    brokers: localhost:9092

server:
    port: 8083