spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/microservices-gygy5
  cloud:
    stream:
      bindings:
        orderEvent-out-0:
          destination: order-topic #hangi başlığa mesaj göndereceğini belirtiyoruz
          content-type: application/json # hangi formatta mesaj göndereceğini belirtiyoruz

      kafka:
        binder:
          brokers: localhost:9092
