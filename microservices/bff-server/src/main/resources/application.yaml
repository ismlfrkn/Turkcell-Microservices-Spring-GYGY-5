spring:
    application:
        name: bff-server
    security:
        oauth2:
            client:
                registration:
                    keycloak:
                        client-id: bff-client
                        client-secret: wgvRwNIqbFfG7v6HyeLCeldo6zE9oUmj
                        authorization-grant-type: authorization_code
                        scope: openid, profile, email
                provider:
                    keycloak:
                        issuer-uri: http://localhost:8085/realms/microservices-gygy5
    cloud:
        gateway:
            server:
                webmvc:
                    routes:
                        - id: gateway-server
                          uri: lb://gateway-server
                          predicates:
                            - Path=/api/**
                          filters:
                            # Session'da saklanan access token'ı Authorization: Bearer
                            # header'ı olarak ekleyip gateway'e iletir.
                            - TokenRelay

server:
    port: 9000

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        fetch-registry: true
        register-with-eureka: true