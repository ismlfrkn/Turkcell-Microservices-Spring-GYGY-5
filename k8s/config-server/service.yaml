# Service adı "config-server" olmak zorunda:
# diğer servisler SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
# adresiyle cluster-içi DNS üzerinden bu isme erişiyor.
apiVersion: v1
kind: Service
metadata:
  name: config-server
  labels:
    app: config-server
spec:
  type: NodePort
  selector:
    app: config-server
  ports:
    - name: http
      port: 8888 # cluster içi erişim portu (http://config-server:8888)
      targetPort: 8888 # container portu
      nodePort: 30888 # node üzerinden dış erişim portu