apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: product-service:latest # Hangi image ile çalışacaksın ?
          imagePullPolicy: IfNotPresent # Bu image'ı deployment podu restart/scale olduğunda nasıl çekecek ?
          ports:
            - containerPort: 8082
          env:
            # application.yaml'daki localhost:8888 adresini cluster ici service adiyla override eder.
            # "optional:" oldugu icin config-server henuz deploy edilmediyse uygulama yine ayaga kalkar.
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
          resources:
            requests: # Bu deployment kodu çalıştırmadan önce minimum ne kadar kaynak ayıracak ?
              cpu: 250m
              memory: 512Mi
            limits: # Bu deployment kodu çalıştırmadan önce maksimum ne kadar kaynak ayıracak ?
              cpu: 500m
              memory: 1Gi # limiti aştığında ne olacak ? pod restart olur.
          readinessProbe: # docker'daki healtcheck'e benzer bir yapı. podun hazır olup olmadığını kontrol eder. hazır değilse service'e trafik gitmez.
            tcpSocket:
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe: # docker'daki healtcheck'e benzer bir yapı. podun canlı olup olmadığını kontrol eder. canlı değilse pod restart olur.
            tcpSocket:
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15